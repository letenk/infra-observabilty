server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Container name jadi label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      # Ambil label dari container Docker (set via docker-compose)
      - source_labels: ['__meta_docker_container_label_app']
        target_label: 'app'
      - source_labels: ['__meta_docker_container_label_env']
        target_label: 'env'
    pipeline_stages:
      # Parse JSON log dari zerolog supaya field-nya ke-extract
      - json:
          expressions:
            level: level
            request_id: request_id
            msg: message
      - labels:
          level: